<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MangaSearch</title>

<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --text: #1a1d21;
    --text-dim: #6a7280;
    --border: #e3e6ea;
    --accent: #6c5ce7;
    --accent-soft: #eceafd;
    --pos: #0f7b4f;
    --pos-soft: #e2f5ec;
    --neg: #b3392f;
    --neg-soft: #fbe9e7;
    --row-hover: #f0f1f5;
    --chip: #eef0f3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --surface: #1d2026;
      --text: #e8eaed;
      --text-dim: #9aa2ad;
      --border: #2c3038;
      --accent: #a29bfe;
      --accent-soft: #2b2842;
      --pos: #5ecf9a;
      --pos-soft: #1c3229;
      --neg: #f08a80;
      --neg-soft: #3a2320;
      --row-hover: #23262d;
      --chip: #282c34;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px 14px;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: -0.2px; }
  header h1 span { color: var(--accent); }
  .updated { color: var(--text-dim); font-size: 12.5px; }
  .spacer { flex: 1; }
  #search {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 14px;
    width: 230px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 8px;
    font-size: 14px;
  }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button {
    background: var(--bg);
    color: var(--text-dim);
    border: none;
    padding: 7px 12px;
    font-size: 13.5px;
    cursor: pointer;
  }
  .seg button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  #count { color: var(--text-dim); font-size: 13px; white-space: nowrap; }

  main { padding: 16px 20px 40px; max-width: 1400px; margin: 0 auto; }
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow-x: auto;
  }
  table { border-collapse: collapse; width: 100%; min-width: 980px; }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  thead th.sortable { cursor: pointer; }
  thead th.sortable:hover { color: var(--text); }
  thead th .arrow { font-size: 10px; }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }
  .rank { color: var(--text-dim); font-variant-numeric: tabular-nums; width: 36px; }
  .cover img {
    width: 48px;
    height: 68px;
    object-fit: cover;
    border-radius: 6px;
    display: block;
    background: var(--chip);
  }
  .title a { color: var(--text); font-weight: 600; text-decoration: none; }
  .title a:hover { color: var(--accent); }
  .readlinks { margin-top: 3px; font-size: 12px; }
  .readlinks a { color: var(--text-dim); text-decoration: none; margin-right: 8px; }
  .readlinks a:hover { color: var(--accent); }
  .chip {
    display: inline-block;
    background: var(--chip);
    color: var(--text-dim);
    border-radius: 999px;
    padding: 1.5px 8px;
    font-size: 11.5px;
    margin: 1.5px 3px 1.5px 0;
    white-space: nowrap;
  }
  .status { font-size: 12.5px; color: var(--text-dim); max-width: 190px; }
  .num { font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
  .score { font-weight: 700; font-size: 15.5px; color: var(--accent); }
  .why { max-width: 200px; }
  .mod {
    display: inline-block;
    border-radius: 5px;
    padding: 1px 6px;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    margin: 1.5px 3px 1.5px 0;
    white-space: nowrap;
  }
  .mod.pos { background: var(--pos-soft); color: var(--pos); }
  .mod.neg { background: var(--neg-soft); color: var(--neg); }
  .empty { padding: 40px; text-align: center; color: var(--text-dim); }
  @media (max-width: 720px) {
    header { padding: 10px 12px; }
    #search { width: 100%; }
    main { padding: 10px 8px 30px; }
  }
</style>
</head>
<body>
<header>
  <h1>Manga<span>Search</span></h1>
  <span class="updated">Updated 2026-07-11 15:13</span>
  <span class="spacer"></span>
  <input id="search" type="search" placeholder="Search titles…" autocomplete="off">
  <select id="genre"><option value="">All genres</option></select>
  <div class="seg" id="statusSeg">
    <button data-status="" class="active">All</button>
    <button data-status="completed">Completed</button>
    <button data-status="ongoing">Ongoing</button>
  </div>
  <span id="count"></span>
</header>
<main>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th></th>
          <th class="sortable" data-key="title">Title</th>
          <th class="sortable" data-key="year">Year</th>
          <th>Genres</th>
          <th>Status</th>
          <th class="sortable num" data-key="votes">Votes</th>
          <th class="sortable num" data-key="bayesian">Bayesian</th>
          <th class="sortable num" data-key="average">Avg</th>
          <th class="sortable num" data-key="score">Score</th>
          <th>Why</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" hidden>No matches.</div>
  </div>
</main>

<script>
(function () {
  var DATA = JSON.parse(document.getElementById('data').textContent);
  var state = { query: '', genre: '', status: '', sortKey: 'rank', sortDir: 1 };

  var esc = function (s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  };

  // Populate genre filter from the data.
  var genres = {};
  DATA.forEach(function (r) { r.genres.forEach(function (g) { genres[g] = true; }); });
  var genreSel = document.getElementById('genre');
  Object.keys(genres).sort().forEach(function (g) {
    var opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    genreSel.appendChild(opt);
  });

  function searchLink(engine, title) {
    var q = encodeURIComponent('read ' + title);
    if (engine === 'g') return 'https://www.google.com/search?q=' + q;
    if (engine === 'd') return 'https://duckduckgo.com/?q=' + q;
    return 'https://yandex.com/search/?text=' + q;
  }

  function rowHtml(r) {
    var mods = Object.keys(r.breakdown).map(function (k) {
      var v = r.breakdown[k];
      return '<span class="mod ' + (v >= 0 ? 'pos' : 'neg') + '">' +
        esc(k) + ' ' + (v >= 0 ? '+' : '') + v.toFixed(2) + '</span>';
    }).join('');
    return '<tr>' +
      '<td class="rank">' + r.rank + '</td>' +
      '<td class="cover">' + (r.image
        ? '<img loading="lazy" src="' + esc(r.image) + '" alt="">' : '') + '</td>' +
      '<td class="title"><a target="_blank" rel="noopener" href="' + esc(r.url) + '">' +
        esc(r.title) + '</a>' +
        '<div class="readlinks">' +
          '<a target="_blank" rel="noopener" href="' + searchLink('g', r.title) + '">google</a>' +
          '<a target="_blank" rel="noopener" href="' + searchLink('d', r.title) + '">duck</a>' +
          '<a target="_blank" rel="noopener" href="' + searchLink('y', r.title) + '">yandex</a>' +
        '</div></td>' +
      '<td>' + esc(r.year) + '</td>' +
      '<td>' + r.genres.map(function (g) {
          return '<span class="chip">' + esc(g) + '</span>';
        }).join('') + '</td>' +
      '<td class="status">' + esc(r.status) + '</td>' +
      '<td class="num">' + r.votes + '</td>' +
      '<td class="num">' + r.bayesian.toFixed(2) + '</td>' +
      '<td class="num">' + (r.average ? r.average.toFixed(2) : '—') + '</td>' +
      '<td class="num score">' + r.score.toFixed(2) + '</td>' +
      '<td class="why">' + mods + '</td>' +
      '</tr>';
  }

  function render() {
    var q = state.query.toLowerCase();
    var rows = DATA.filter(function (r) {
      if (q && r.title.toLowerCase().indexOf(q) === -1) return false;
      if (state.genre && r.genres.indexOf(state.genre) === -1) return false;
      if (state.status === 'completed' && !r.completed) return false;
      if (state.status === 'ongoing' && r.completed) return false;
      return true;
    });
    rows.sort(function (a, b) {
      var ka = a[state.sortKey], kb = b[state.sortKey];
      if (typeof ka === 'string') { ka = ka.toLowerCase(); kb = kb.toLowerCase(); }
      return (ka < kb ? -1 : ka > kb ? 1 : 0) * state.sortDir;
    });
    document.getElementById('rows').innerHTML = rows.map(rowHtml).join('');
    document.getElementById('empty').hidden = rows.length > 0;
    document.getElementById('count').textContent =
      rows.length === DATA.length ? DATA.length + ' series'
                                  : rows.length + ' / ' + DATA.length;
  }

  document.getElementById('search').addEventListener('input', function (e) {
    state.query = e.target.value.trim();
    render();
  });
  genreSel.addEventListener('change', function (e) {
    state.genre = e.target.value;
    render();
  });
  document.getElementById('statusSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    this.querySelectorAll('button').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    state.status = btn.dataset.status;
    render();
  });
  document.querySelectorAll('th.sortable').forEach(function (th) {
    th.addEventListener('click', function () {
      var key = th.dataset.key;
      if (state.sortKey === key) {
        state.sortDir = -state.sortDir;
      } else {
        state.sortKey = key;
        // Numeric columns default to descending, title to ascending.
        state.sortDir = key === 'title' ? 1 : -1;
      }
      document.querySelectorAll('th .arrow').forEach(function (a) { a.remove(); });
      var arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = state.sortDir === 1 ? ' ▲' : ' ▼';
      th.appendChild(arrow);
      render();
    });
  });

  render();
})();
</script>
</body>
</html>
